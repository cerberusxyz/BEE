<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Business Email Etiquette Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start-screen">
  <h1>📧 Email Etiquette Simulator</h1>
  <p>Select Difficulty:</p>
  <button onclick="startGame('novice')">Novice</button>
  <button onclick="startGame('intermediate')">Intermediate</button>
  <button onclick="startGame('expert')">Expert</button>
</div>

<div id="game-screen" class="hidden">
  <div id="header">
    <span id="difficulty"></span>
    <span id="strikes">Strikes: 0 / 3</span>
  </div>

  <div id="email-box">
    <h3 id="email-subject"></h3>
    <p id="email-body"></p>
  </div>

  <div id="controls">
    <button onclick="answer(true)">✅ Appropriate</button>
    <button onclick="answer(false)">❌ Inappropriate</button>
  </div>
</div>

<div id="end-screen" class="hidden">
  <h1 id="end-message"></h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<script src="script.js"></script>
</body>
</html>
