<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Etiquette Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- START -->
<div id="start-screen">
  <div class="card">
    <h1>📧 Email Etiquette Simulator</h1>
    <p>Select Difficulty</p>
    <button onclick="startGame('novice')">Novice</button>
    <button onclick="startGame('intermediate')">Intermediate</button>
    <button onclick="startGame('expert')">Expert</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div id="topbar">
    <div>
      <span id="difficulty"></span> |
      <span id="strikes"></span> |
      <span id="score"></span> |
      <span id="grade"></span>
    </div>

    <button id="modeToggle" onclick="toggleMode()">🌙 Dark Mode</button>
  </div>

  <div id="main">

    <div id="sidebar">
      <h3>Inbox</h3>
      <ul id="email-list"></ul>
    </div>

    <div id="content">
      <h2 id="email-subject">Select an email</h2>

      <div id="email-body"></div>

      <div id="actions" class="hidden">
        <button onclick="answer(true)">✅ Appropriate</button>
        <button onclick="answer(false)">❌ Inappropriate</button>
      </div>

      <div id="feedback" class="hidden"></div>
    </div>

  </div>
</div>

<!-- END -->
<div id="end-screen" class="hidden">
  <div class="card">
    <h1 id="end-message"></h1>
    <p id="final-score"></p>
    <button onclick="location.reload()">Play Again</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
