<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Etiquette Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen">
  <h1>Email Etiquette Simulator</h1>
  <p>Select Difficulty:</p>
  <button onclick="startGame('novice')">Novice</button>
  <button onclick="startGame('intermediate')">Intermediate</button>
  <button onclick="startGame('expert')">Expert</button>

  <button id="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
</div>

<!-- GAME UI -->
<div id="app" class="hidden">

  <div id="topbar">
    <span id="strikes">Strikes: 0 / 3</span>
  </div>

  <div id="main">

    <div id="sidebar">
      <h3>Inbox</h3>
      <ul id="email-list"></ul>
    </div>

    <div id="content">
      <h2 id="email-subject">Select an email</h2>
      <pre id="email-body"></pre>

      <div id="actions" class="hidden">
        <button onclick="answer(true)">Appropriate</button>
        <button onclick="answer(false)">Inappropriate</button>
      </div>

      <div id="feedback" class="hidden"></div>
    </div>

  </div>
</div>

<!-- END SCREEN -->
<div id="end-screen" class="hidden">
  <h1 id="end-message"></h1>
  <div id="final-score"></div>
  <button onclick="location.reload()">Play Again</button>
</div>

<script src="script.js"></script>
</body>
</html>
