<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Etiquette Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen">

  <!-- MENU TOP BAR (ONLY CHANGE) -->
  <div id="menu-topbar">
    <h1>Email Etiquette Simulator</h1>

    <div>
      <button onclick="toggleTheme()">Dark Mode</button>
    </div>
  </div>

  <p>Select Difficulty:</p>
  <button onclick="startGame('novice')">Novice</button>
  <button onclick="startGame('intermediate')">Intermediate</button>
  <button onclick="startGame('expert')">Expert</button>

</div>

<!-- GAME UI -->
<div id="app" style="display:none;">

  <div id="topbar">
    <span id="strikes">Strikes: 0 / 3</span>
  </div>

  <div id="main">

    <div id="sidebar">
      <h3>Inbox</h3>
      <ul id="email-list"></ul>
    </div>

    <div id="content">
      <h2 id="email-subject">Select an email</h2>
      <pre id="email-body"></pre>

      <div id="actions">
        <button onclick="answer(true)">Appropriate</button>
        <button onclick="answer(false)">Inappropriate</button>
      </div>

      <div id="feedback"></div>
    </div>

  </div>
</div>

<!-- END SCREEN -->
<div id="end-screen" style="display:none;">
  <h1 id="end-message"></h1>
  <button onclick="location.reload()">Play Again</button>
</div>

<script src="script.js"></script>
</body>
</html>
